<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>QAL — Confirming your spot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --bg:#0A0A0A;--white:#F5F0E8;--gold:#C9A84C;--teal-l:#3DA89F;
  --muted:rgba(245,240,232,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;}
.card{max-width:480px;width:100%;text-align:center;}
.logo{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--teal-l);text-transform:uppercase;margin-bottom:40px;}
.icon{font-size:48px;margin-bottom:24px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--white);margin-bottom:12px;}
h1 span{color:var(--gold);}
p{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:32px;}
.btn{display:inline-block;background:var(--gold);color:#0A0A0A;text-decoration:none;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:14px 28px;border-radius:4px;}
.status{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);margin-top:40px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Q Aging Lab</div>
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Confirming<br><span>your spot.</span></h1>
  <p id="message">One moment — we are locking in your place on the waitlist.</p>
  <div class="status" id="status">Processing...</div>
</div>

<script>
const SUPABASE_URL = 'https://xyikfhdgxcrzkkpkhyfp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5aWtmaGRneGNyemtrcGtoeWZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDM3MzcsImV4cCI6MjA5NjE3OTczN30.OQ9bNhLqU9rokTrS0Dmoan8jhNROxVbos4F58sNdxPg';

async function verify() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    showError('No confirmation ID found. Please use the link from your email.');
    return;
  }

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/waitlist?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ is_verified: true })
    });

    if (response.ok) {
      showSuccess();
    } else {
      const err = await response.text();
      console.log('Supabase error:', response.status, err);
      showError('Error ' + response.status + ': ' + err);
    }
  } catch (err) {
    showError('Connection error. Please check your internet and try again.');
  }
}

function showSuccess() {
  document.getElementById('icon').textContent = '✓';
  document.getElementById('icon').style.color = '#C9A84C';
  document.getElementById('title').innerHTML = "You're in.<br><span>Spot confirmed.</span>";
  document.getElementById('message').textContent = "You are on the Q Aging Lab waitlist. We will reach out when the app and the 50+ Tropical Longevity Blueprint launch.";
  document.getElementById('status').textContent = 'Confirmed — ' + new Date().toLocaleDateString();

  const btn = document.createElement('a');
  btn.href = 'https://qaginglab.com';
  btn.className = 'btn';
  btn.style.marginTop = '24px';
  btn.textContent = 'Back to QAL →';
  document.querySelector('.card').appendChild(btn);
}

function showError(msg) {
  document.getElementById('icon').textContent = '✗';
  document.getElementById('icon').style.color = '#C0392B';
  document.getElementById('title').innerHTML = 'Something<br><span>went wrong.</span>';
  document.getElementById('message').textContent = msg;
  document.getElementById('status').textContent = 'Error';
}

verify();
</script>
</body>
</html>
